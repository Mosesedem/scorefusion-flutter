name: scorefusion
description: Score Fusion — live scores and match alerts in a native Flutter shell.
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_inappwebview: ^6.1.5
  flutter_local_notifications: ^18.0.1
  connectivity_plus: ^6.1.4
  internet_connection_checker_plus: ^2.7.2
  shared_preferences: ^2.5.3
  lottie: ^3.3.1
  url_launcher: ^6.3.1
  app_settings: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/splash.json
    - assets/images/icon.png